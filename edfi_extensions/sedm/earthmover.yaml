# See accompanying README.md for details about this file.
version: 2

config:
  log_level: INFO
  output_dir: ${OUTPUT_DIR}
  memory_limit: 1GB
  state_file: ${STATE_FILE}
  show_graph: False
  parameter_defaults:
    DESCRIPTOR_NAMESPACE: uri://sedm.sc.gov


sources:
  idea_events:
    file: ${IDEA_EVENTS_FILE}
    header_rows: 1
  student_ieps:
    file: ${STUDENT_IEPS_FILE}
    header_rows: 1
  student_iep_disability_collections:
    file: ${STUDENT_IEP_DISABILITY_COLLECTIONS_FILE}
    header_rows: 1
  disability_descriptors:
    file: ./seeds/disability_descriptors.csv
    header_rows: 1
  iep_status_descriptors:
    file: ./seeds/iep_status_descriptors.csv
    header_rows: 1
  idea_event_descriptors:
    file: ./seeds/idea_event_descriptors.csv
    header_rows: 1


transformations:
  idea_events:
    source: $sources.idea_events
    operations:
      - operation: snake_case_columns
      - operation: date_format
        columns: 
          - event_date
          - event_begin_date
          - event_end_date
        from_format: "%m/%d/%Y"
        to_format: "%Y-%m-%d"
  
  student_ieps:
    source: $sources.student_ieps
    operations:
      - operation: snake_case_columns
      - operation: date_format
        columns: 
          - event_date
          - event_begin_date
          - event_end_date
        from_format: "%m/%d/%Y"
        to_format: "%Y-%m-%d"
      - operation: map_values
        column: placement
        map_file: ./seeds/special_ed_setting_mapping.csv

  

  student_iep_disability_collections:
    source: $sources.student_iep_disability_collections
    operations:
      - operation: snake_case_columns
      - operation: debug
      - operation: date_format
        columns: 
          - event_date
        from_format: "%m/%d/%Y"
        to_format: "%Y-%m-%d"
      - operation: filter_rows
        query: primary_disability != ''
        behavior: include

destinations:
  ideaEvents:
    source: $transformations.idea_events
    template: ./templates/iDEAEvents.jsont
    extension: jsonl
  studentIEPs:
    source: $transformations.student_ieps
    template: ./templates/studentIEPs.jsont
    extension: jsonl
  studentIEPDisabilityCollections:
    source: $transformations.student_iep_disability_collections
    template: ./templates/studentIEPDisabilityCollections.jsont
    extension: jsonl
  disabilityDescriptors:
    source: $sources.disability_descriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
  IEPStatusDescriptors:
    source: $sources.iep_status_descriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
  IDEAEventDescriptors:
    source: $sources.idea_event_descriptors
    template: ./templates/descriptors.jsont
    extension: jsonl