state_dir: ./.lightbeam/
data_dir: ${DATA_DIR}
log_level: DEBUG
show_stacktrace: True
edfi_api:
  version: 3
  mode: district_specific
  year: ${API_YEAR}
  base_url: ${EDFI_API_BASE_URL}
  client_id: ${EDFI_API_CLIENT_ID}
  client_secret: ${EDFI_API_CLIENT_SECRET}
connection:
  pool_size: 8
  timeout: 5000
  num_retries: 10
  backoff_factor: 1.5
  retry_statuses: [429, 500, 502, 503, 504]
  verify_ssl: False
