version: 2

edfi_api:
  base_url: ${EDFI_API_BASE_URL}
  client_id: ${EDFI_API_CLIENT_ID}
  client_secret: ${EDFI_API_CLIENT_SECRET}
  api_year: ${API_YEAR}

send:
  - selector: assessmentReportingMethodDescriptors
    file: ${DATA_DIR}/assessmentReportingMethodDescriptors.jsonl
    type: assessmentReportingMethodDescriptors
    pre-endpoints:
      - endpoint: descriptorValues
        selector: assessmentReportingMethodDescriptors
  - selector: performanceLevelDescriptors
    file: ${DATA_DIR}/performanceLevelDescriptors.jsonl
    type: performanceLevelDescriptors
    pre-endpoints:
      - endpoint: descriptorValues
        selector: performanceLevelDescriptors
  - selector: assessments
    file: ${DATA_DIR}/assessments.jsonl
    type: assessments
  - selector: objectiveAssessments
    file: ${DATA_DIR}/objectiveAssessments.jsonl
    type: objectiveAssessments
  - selector: studentAssessments
    file: ${DATA_DIR}/studentAssessments.jsonl
    type: studentAssessments
