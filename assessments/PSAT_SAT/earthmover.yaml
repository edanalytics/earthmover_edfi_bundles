version: 2


config:
  log_level: INFO
  output_dir: ${OUTPUT_DIR}
  memory_limit: 1GB
  state_file: ${STATE_FILE}
  show_graph: False
  show_stacktrace: true
  parameter_defaults:
    STUDENT_ID_NAME: 'edFi_studentUniqueID' # default to the column added by the apply_xwalk package of student ID xwalking feature
    POSSIBLE_STUDENT_ID_COLUMNS: STATE_STUDENT_ID,DISTRICT_STUDENT_ID,SECONDARY_ID
    DESCRIPTOR_NAMESPACE: uri://ed-fi.org
    ASSESSMENT_TYPE: '' # Options: 'SAT', 'PSAT-8/9', 'PSAT-10', 'PSAT-NMSQT', or leave empty for auto-detection


sources:
  assessments:
    file: ./seeds/assessments.csv
    header_rows: 1
  academicSubjectDescriptors:
    file: ./seeds/academicSubjectDescriptors.csv
    header_rows: 1
  assessmentCategoryDescriptors:
    file: ./seeds/assessmentCategoryDescriptors.csv
    header_rows: 1
  assessmentReportingMethodDescriptors:
    file: ./seeds/assessmentReportingMethodDescriptors.csv
    header_rows: 1
  objectiveAssessments:
    file: ./seeds/objectiveAssessments.csv
    header_rows: 1
  performanceLevelDescriptors:
    file: ./seeds/performanceLevelDescriptors.csv
    header_rows: 1
  gradeLevelDescriptors:
    file: ./seeds/gradeLevelDescriptors.csv
    header_rows: 1

  input:
    # THIS FILE DOES NOT EXIST; IT MUST BE SUPPLIED BY THE USER!
    file: ${INPUT_FILE}
    header_rows: 1
    # See the accompanying bundle_metadata.json for a list of required columns for this file
    # Or see data/sample_*_anonymized.csv



transformations:
  input:
    source: $sources.input
    operations: []

  clean_results:
    source: $transformations.input
    operations:
      - operation: duplicate_columns
        columns:
          ${STUDENT_ID_NAME}: studentUniqueId
      - operation: add_columns
        columns:
          schoolYear: ${API_YEAR}
          namespace: "uri://collegeboard.org/Assessment"
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}
      # Add parameter value as column for conditional logic
      - operation: add_columns
        columns:
          assessment_type_param: ${ASSESSMENT_TYPE}
      # Determine assessment type (auto-detect if not explicitly provided)
      - operation: add_columns
        columns:
          assessmentIdentifier: >
            {%raw-%}
            {%- if assessment_type_param is not none and assessment_type_param | length -%}
              {{assessment_type_param}}
            {%- elif LATEST_SAT_DATE is defined and LATEST_SAT_DATE is not none and LATEST_SAT_DATE | length -%}
              SAT
            {%- elif LATEST_PSAT_GRADE is defined and LATEST_PSAT_GRADE is not none and LATEST_PSAT_GRADE | length -%}
              {%- if LATEST_PSAT_GRADE in ['8', '9'] -%}
                PSAT-8/9
              {%- elif LATEST_PSAT_GRADE == '10' -%}
                PSAT-10
              {%- else -%}
                PSAT-NMSQT
              {%- endif -%}
            {%- else -%}
              PSAT-NMSQT
            {%- endif -%}
            {%-endraw%}
      # Extract administration date (try both SAT and PSAT columns)
      - operation: add_columns
        columns:
          administrationDate: >
            {%raw-%}
            {%- if LATEST_SAT_DATE is defined and LATEST_SAT_DATE | length -%}
              {{LATEST_SAT_DATE}}
            {%- elif LATEST_PSAT_DATE is defined and LATEST_PSAT_DATE | length -%}
              {{LATEST_PSAT_DATE}}
            {%- endif -%}
            {%-endraw%}
      - operation: combine_columns
        columns:
          - studentUniqueId
          - administrationDate
          - assessmentIdentifier
        new_column: studentAssessmentIdentifier
        separator: '-'
      - operation: modify_columns
        columns:
          studentAssessmentIdentifier: "{%raw%}{{ md5(studentAssessmentIdentifier) }}{%endraw%}"
      # Convert date format YYYY-MM-DD
      - operation: date_format
        column: administrationDate
        from_format: "%Y-%m-%d"
        to_format: "%Y-%m-%d"
      # Extract grade level (try both SAT and PSAT columns, with assessment-specific defaults)
      - operation: add_columns
        columns:
          gradeLevelWhenAssessed: >
            {%raw-%}
            {%- if LATEST_SAT_GRADE is defined and LATEST_SAT_GRADE | length -%}
              {{LATEST_SAT_GRADE}}
            {%- elif LATEST_PSAT_GRADE is defined and LATEST_PSAT_GRADE | length -%}
              {{LATEST_PSAT_GRADE}}
            {%- elif assessmentIdentifier == 'PSAT-8/9' -%}
              9
            {%- elif assessmentIdentifier == 'PSAT-10' -%}
              10
            {%- else -%}
              11
            {%- endif -%}
            {%-endraw%}
      # Join with grade level descriptors
      - operation: join
        sources:
          - $sources.gradeLevelDescriptors
        join_type: inner
        left_keys:
          - gradeLevelWhenAssessed
          - assessmentIdentifier
        right_keys:
          - originalGrade
          - assessmentIdentifier

  academic_subject_descriptors:
    source: $sources.academicSubjectDescriptors
    operations:
      # keep the highest level assessment only
      - operation: filter_rows
        query: "identificationCode != ''"
        behavior: exclude
      - operation: add_columns
        columns:
          subject_json: >
              {%raw-%}
              {
                "academicSubjectDescriptor": "{{edfi_descriptor}}"
              },
              {%-endraw%}
      - operation: modify_columns
        columns:
          subject_json: "{%raw%}{{subject_json | replace('\n', '')-}}{%endraw%}"
        # group and aggregate:
      - operation: group_by
        group_by_columns:
          - assessmentIdentifier
        create_columns:
          subject_json: agg(subject_json,)
      # there will be a trailing comma, want to get rid of that
      - operation: modify_columns
        columns:
          subject_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  # instead of hardcoding descriptors that typically use ed-fi defaults (like subjects/grades)
  # we list those in a csv and aggregate as a transformation so we never hardcode those in the jsont
  grade_level_descriptors:
    source: $sources.gradeLevelDescriptors
    operations:
      - operation: distinct_rows
        columns:
        - assessmentIdentifier
        - edfi_descriptor
      - operation: add_columns
        columns:
          grade_json: >
            {%raw-%}
            {
              "gradeLevelDescriptor": "{{edfi_descriptor}}"
            },
            {%-endraw%}
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{grade_json | replace('\n', '')-}}{%endraw%}"
      # group and aggregate:
      - operation: group_by
        group_by_columns:
          - assessmentIdentifier
        create_columns:
          grade_json: agg(grade_json,)
      # there will be a trailing comma, want to get rid of that
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  assessments:
    source: $sources.assessments
    operations:
      - operation: join
        sources:
          - $transformations.grade_level_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $transformations.academic_subject_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $sources.assessmentCategoryDescriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: add_columns
        columns:
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}

  objective_assessments:
    source: $sources.objectiveAssessments
    operations:
      - operation: join
        sources:
          - $sources.academicSubjectDescriptors
        join_type: inner
        left_keys:
          - identificationCode
          - assessmentIdentifier
        right_keys:
          - identificationCode
          - assessmentIdentifier
      - operation: add_columns
        columns:
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}

destinations:
  assessments:
    source: $transformations.assessments
    template: ./templates/assessments.jsont
    extension: jsonl
  assessmentReportingMethodDescriptors:
    source: $sources.assessmentReportingMethodDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
  performanceLevelDescriptors:
    source: $sources.performanceLevelDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
  objectiveAssessments:
    source: $transformations.objective_assessments
    template: ./templates/objectiveAssessments.jsont
    extension: jsonl
  studentAssessments:
    source: $transformations.clean_results
    template: ./templates/studentAssessments.jsont
    extension: jsonl
