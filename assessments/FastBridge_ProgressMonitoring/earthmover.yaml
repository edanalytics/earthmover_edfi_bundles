version: 2

config:
  log_level: INFO
  output_dir: ${OUTPUT_DIR}
  memory_limit: 1GB
  state_file: ${STATE_FILE}
  show_graph: false
  show_stacktrace: true
  parameter_defaults:
    # You can set these values at the command line or leave the defaults
    OUTPUT_DIR: ./output/
    STUDENT_ID_NAME: 'edFi_studentUniqueID' # default to the column added by the apply_xwalk package of student ID xwalking feature
    POSSIBLE_STUDENT_ID_COLUMNS: Local ID,State ID
    DESCRIPTOR_NAMESPACE: uri://ed-fi.org
    API_YEAR: 2025

sources:
  input:
    file: ${INPUT_FILE} # Path to the input CSV file
    header_rows: 1
  gradeLevelDescriptors:
    file: ./seeds/gradeLevelDescriptors.csv
    header_rows: 1

transformations:
  input:
    source: $sources.input
    operations: []

  cleaned_input:
    source: $transformations.input
    operations:
      - operation: duplicate_columns
        columns:
          ${STUDENT_ID_NAME}: student_unique_id
      - operation: snake_case_columns
      - operation: duplicate_columns
        columns:
          assessment_date: administration_date
      - operation: filter_rows
        query: administration_date == ''
        behavior: exclude
      - operation: map_values
        columns: 
          - assessment
        map_file: ./seeds/assessment_mapping.csv
      - operation: add_columns
        columns:
          assessmentIdentifier: "{%raw%}FastBridge_{{ assessment.strip() }}_PM{%endraw%}"
          namespace: "uri://fastbridge.org/assessment"
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}
          school_year: ${API_YEAR}
      - operation: combine_columns
        columns:
          - administration_date
          - student_unique_id
          - assessment
        new_column: studentAssessmentIdentifier
        separator: '-'
      - operation: modify_columns
        columns:
          studentAssessmentIdentifier: "{%raw%}{{ md5(studentAssessmentIdentifier) }}{%endraw%}"
      - operation: date_format
        column: administration_date
        from_format: "%m/%d/%Y"
        to_format: "%Y-%m-%d"
      - operation: join
        sources:
          - $sources.gradeLevelDescriptors
        join_type: left
        left_key: grade
        right_key: original_grade
        right_keep_columns:
        - gradeLevelDescriptor
      - operation: modify_columns
        columns:
          gradeLevelDescriptor: "{%raw%}{%- if value != value -%}{%- else -%}{{value}}{%- endif -%}{%endraw%}"
      # filter out rows with missing student IDs
      - operation: filter_rows
        query: "student_unique_id	 != ''"
        behavior: include
      - operation: add_columns
        columns:
          score_dict: "{%raw%}FastBridge_{{ assessment.strip() }}_PM{%endraw%}"
      - operation: pivot
        cols_by: score_metric
        rows_by: 
          - student_unique_id
          - assessmentIdentifier
          - studentAssessmentIdentifier
        values: score
      - operation: debug
        rows: 10
        to_file: /home/raguilar/code/sandbox/wdl/fastbridgepm/debug_pivot.csv

# Generate grade level JSON for assessments
  grade_level_descriptors:
    source: $sources.gradeLevelDescriptors
    operations:
      - operation: add_columns
        columns:
          grade_json: >
            {%raw-%}
            {
              "gradeLevelDescriptor": "{{edfi_descriptor}}"
            },
            {%-endraw%}
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{grade_json | replace('\n', '')-}}{%endraw%}"
      # group and aggregate:
      - operation: group_by
        group_by_columns:
          - assessmentIdentifier
        create_columns:
          grade_json: agg(grade_json,)
      # there will be a trailing comma, want to get rid of that
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  # Generate scores JSON for  assessments
  assessment_scores:
    source: $sources.assessmentScores
    operations:
      - operation: add_columns
        columns:
          score_json: >
            {%raw-%}
            {
              "assessmentReportingMethodDescriptor": "uri://fastbridge.org/assessment/AssessmentReportingMethodDescriptor#{{scoreType}}",
              "resultDatatypeTypeDescriptor": "${DESCRIPTOR_NAMESPACE}/ResultDatatypeTypeDescriptor#{{resultDatatype}}"
            },
            {%-endraw%}
      - operation: modify_columns
        columns:
          score_json: "{%raw%}{{score_json | replace('\n', '')-}}{%endraw%}"
      # group and aggregate by identificationCode:
      - operation: group_by
        group_by_columns:
          - identificationCode
        create_columns:
          score_json: agg(score_json,)
      # there will be a trailing comma, want to get rid of that
      - operation: modify_columns
        columns:
          score_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  assessment_category_descriptors:
    source: $sources.assessmentCategoryDescriptors
    operations:
      - operation: add_columns
        columns:
          assessmentCategoryDescriptor: "{%raw%}{{namespace}}#{{codeValue}}{%endraw%}"
      - operation: keep_columns
        columns:
          - assessmentIdentifier
          - assessmentCategoryDescriptor

  # Prepare assessments with proper structure
  assessments:
    source: $sources.assessments
    operations:
      - operation: join
        sources:
          - $transformations.grade_level_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $transformations.performance_level_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $transformations.assessment_period_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $sources.academicSubjectDescriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: rename_columns
        columns:
         edfi_descriptor: academicSubjectDescriptor
      - operation: join
        sources:
          - $transformations.assessment_category_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: add_columns
        columns:
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}
      - operation: join
        sources:
          - $transformations.assessment_scores
        join_type: inner
        left_key: identificationCode
        right_key: identificationCode


destinations:
  assessments:
    source: $transformations.assessments
    template: ./templates/assessments.jsont
    extension: jsonl
  studentAssessments:
    source: $transformations.cleaned_input
    template: ./templates/studentAssessments.jsont
    extension: jsonl
  assessmentCategoryDescriptors:
    source: $sources.assessmentCategoryDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  assessmentReportingMethodDescriptors:
    source: $sources.assessmentReportingMethodDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  assessmentPeriodDescriptors:
    source: $sources.assessmentPeriodDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  performanceLevelDescriptors:
    source: $sources.performanceLevelDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True