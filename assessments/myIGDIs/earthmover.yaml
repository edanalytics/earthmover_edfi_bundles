version: 2
config:
  output_dir: ${OUTPUT_DIR}
  memory_limit: 1GB
  state_file: ./runs.csv
  show_graph: False
  show_stacktrace: true
  parameter_defaults:
    STUDENT_ID_NAME: 'edFi_studentUniqueID'
    POSSIBLE_STUDENT_ID_COLUMNS: "Student Id"
    DESCRIPTOR_NAMESPACE: uri://ed-fi.org

sources:
  input:
    file: ${INPUT_FILE}
    header_rows: 1
  academicSubjectDescriptors:
    file: ./seeds/academicSubjectDescriptors.csv
    header_rows: 1
  assessments:
    file: ./seeds/assessments.csv
    header_rows: 1
  assessmentCategoryDescriptors:
    file: ./seeds/assessmentCategoryDescriptors.csv
    header_rows: 1
  assessmentReportingPeriodDescriptors:
    file: ./seeds/assessmentPeriodDescriptors.csv
    header_rows: 1
  assessmentReportingMethodDescriptors:
    file: ./seeds/assessmentReportingMethodDescriptors.csv
    header_rows: 1
  gradeLevelDescriptors:
    file: ./seeds/gradeLevelDescriptors.csv
    header_rows: 1
  performanceLevelDescriptors:
    file: ./seeds/performanceLevelDescriptors.csv
    header_rows: 1

transformations:
  input:
    source: $sources.input
    operations: []

  cleaned_input:
    source: $transformations.input
    operations:
      - operation: duplicate_columns
        columns:
          ${STUDENT_ID_NAME}: studentUniqueId
      - operation: rename_columns
        columns:
          School Year: SchoolYear
          Init District Id: InitDistrictId
      - operation: melt
        id_vars: [SchoolYear, "District Name", "School Name", "Classroom Name", "Student's First Name", "Student's Last Name", InitDistrictId, "Student Id", studentUniqueId]
      # Parse the column name: {Assessment}/{Objective...}/{Window}/{Metric}
      # Español objectives contain '/' so we parse from both ends
      - operation: add_columns
        columns:
          assessment: "{%raw%}{{ melt_variable.split('/')[0] }}{%endraw%}"
          objective: "{%raw%}{{ melt_variable.split('/')[1:-2] | join('/') }}{%endraw%}"
          TimeWindow: "{%raw%}{{ melt_variable.split('/')[-2] }}{%endraw%}"
          metric: "{%raw%}{{ melt_variable.split('/')[-1] }}{%endraw%}"
      # Normalize metric names for consistent pivot columns
      - operation: modify_columns
        columns:
          metric: "{%raw%}{% if value == 'Scaled Score' %}Score{% elif value == 'Date Of Administration' %}AdministrationDate{% else %}{{ value }}{% endif %}{%endraw%}"
      # Keep only the metrics we need (exclude Raw Score)
      - operation: filter_rows
        query: "metric in ['Score', 'Tier', 'AdministrationDate']"
        behavior: include
      - operation: pivot
        cols_by: metric
        rows_by: [SchoolYear, "District Name", "School Name", "Classroom Name", "Student's First Name", "Student's Last Name", InitDistrictId, "Student Id", studentUniqueId, assessment, objective, TimeWindow]
        values: melt_value
      - operation: filter_rows
        query: "Score != ''"
        behavior: include
      - operation: add_columns
        columns:
          AssessmentIdentifier: "{%raw%}myIGDIs_{{ assessment | replace(' ', '') }}_{{ objective | replace(' ', '') }}{%endraw%}"
          namespace: uri://renaissance.com/products/myigdis-for-preschool
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}
          timeWindow: "{%raw%}{{ TimeWindow | replace(' ', '') }}{%endraw%}"
          schoolYearFormatted: "{%raw%}{{ SchoolYear.split('-')[1] | int }}{%endraw%}"
      - operation: add_columns
        columns:
          studentAssessmentIdentifier: "{%raw%}{{ md5(AssessmentIdentifier ~ '-' ~ studentUniqueId ~ '-' ~ AdministrationDate) }}{%endraw%}"
      - operation: rename_columns
        columns:
          AssessmentIdentifier: assessmentIdentifier
          AdministrationDate: administrationDate
      - operation: distinct_rows
        columns:
          - studentUniqueId
          - assessmentIdentifier
          - administrationDate

  performance_level_descriptors:
    source: $sources.performanceLevelDescriptors
    operations:
      - operation: add_columns
        columns:
          performance_json: >
              {%raw-%}
              {
                "assessmentReportingMethodDescriptor": "uri://renaissance.com/products/myigdis-for-preschool/AssessmentReportingMethodDescriptor#PerformanceLevel",
                "performanceLevelDescriptor": "{{ namespace }}#{{ codeValue }}"
              },
              {%-endraw%}
      - operation: modify_columns
        columns:
          performance_json: "{%raw%}{{performance_json | replace('\n', '')-}}{%endraw%}"
      - operation: group_by
        group_by_columns:
          - assessmentIdentifier
        create_columns:
          performance_json: agg(performance_json,)
      - operation: modify_columns
        columns:
          performance_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  grade_level_descriptors:
    source: $sources.gradeLevelDescriptors
    operations:
      - operation: add_columns
        columns:
          grade_json: >
              {%raw-%}
              {
                "gradeLevelDescriptor": "{{edfi_descriptor}}"
              },
              {%-endraw%}
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{grade_json | replace('\n', '')-}}{%endraw%}"
      - operation: group_by
        group_by_columns:
          - assessmentIdentifier
        create_columns:
          grade_json: agg(grade_json,)
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

  assessment_category_descriptors:
    source: $sources.assessmentCategoryDescriptors
    operations:
      - operation: add_columns
        columns:
          assessmentCategoryDescriptor: "{%raw%}{{namespace}}#{{codeValue}}{%endraw%}"
      - operation: keep_columns
        columns:
          - assessmentIdentifier
          - assessmentCategoryDescriptor

  unique_assessment_category_descriptors:
    source: $sources.assessmentCategoryDescriptors
    operations:
      - operation: keep_columns
        columns:
          - codeValue
          - description
          - namespace
          - shortDescription
      - operation: distinct_rows

  unique_performance_level_descriptors:
    source: $sources.performanceLevelDescriptors
    operations:
      - operation: keep_columns
        columns:
          - codeValue
          - description
          - namespace
          - shortDescription
      - operation: distinct_rows

  assessments:
    source: $sources.assessments
    operations:
      - operation: join
        sources:
          - $transformations.grade_level_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $transformations.performance_level_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: join
        sources:
          - $sources.academicSubjectDescriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: rename_columns
        columns:
         edfi_descriptor: academicSubjectDescriptor
      - operation: join
        sources:
          - $transformations.assessment_category_descriptors
        join_type: inner
        left_key: assessmentIdentifier
        right_key: assessmentIdentifier
      - operation: add_columns
        columns:
          descriptor_namespace: ${DESCRIPTOR_NAMESPACE}

destinations:
  studentAssessments:
    source: $transformations.cleaned_input
    template: ./templates/studentAssessments.jsont
    extension: jsonl
  assessments:
    source: $transformations.assessments
    template: ./templates/assessments.jsont
    extension: jsonl
  performanceLevelDescriptors:
    source: $transformations.unique_performance_level_descriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  assessmentReportingMethodDescriptors:
    source: $sources.assessmentReportingMethodDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  assessmentPeriodDescriptors:
    source: $sources.assessmentReportingPeriodDescriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  assessmentCategoryDescriptors:
    source: $transformations.unique_assessment_category_descriptors
    template: ./templates/descriptors.jsont
    extension: jsonl
    linearize: True
  studentAssessmentEducationOrganizationAssociations:
    source: $transformations.cleaned_input
    template: ./templates/studentAssessmentEducationOrganizationAssociations.jsont
    extension: jsonl
