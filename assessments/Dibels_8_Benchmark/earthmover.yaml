version: 2

config:
  log_level: INFO
  output_dir: ${OUTPUT_DIR}
  memory_limit: 1GB
  state_file: ${STATE_FILE}
  show_graph: False
  parameter_defaults:
    STUDENT_ID_NAME: Student Primary ID
    STUDENT_ID_FROM: Student Primary ID
    STUDENT_ID_XWALK: ''
    DATABASE_CONNECTION: ''
  
definitions:
  year_mapping: &year_mapping "{%raw%}{{value[-4:]}}{%endraw%}"
  id_hashing: &id_hashing "{%raw%}{{ md5(value) }}{%endraw%}"

sources:
  assessmentReportingMethodDescriptors:
    file: ${BUNDLE_DIR}/seeds/assessmentReportingMethodDescriptors.csv
    header_rows: 1
  performanceLevelDescriptors:
    file: ${BUNDLE_DIR}/seeds/performanceLevelDescriptors.csv
    header_rows: 1
  objectiveAssessments:
    file: ${BUNDLE_DIR}/seeds/objectiveAssessments.csv
    header_rows: 1
  
  academicSubjectDescriptors:
    file: ${BUNDLE_DIR}/seeds/academicSubjectDescriptors_mapping.csv
    header_rows: 1
  academicSubject_expectations:
    file: ${SUBJECT_EXPECTATIONS}
    header_rows: 1
    columns:
      - namespace
      - codeValue
    optional: True
  gradeLevelDescriptors:
    file: ${BUNDLE_DIR}/seeds/gradeLevelDescriptors_mapping.csv
    header_rows: 1
  gradeLevel_expectations:
    file: ${GRADE_EXPECTATIONS}
    header_rows: 1
    columns:
      - namespace
      - codeValue
    optional: True

  dibels_benchmark_input:
    file: ${INPUT_FILE}
    header_rows: 1

  {% if "${DATABASE_CONNECTION}" | length %}
  student_id_mapping:
    connection: ${DATABASE_CONNECTION}
    query: ${STUDENT_ID_QUERY}
  
  {% else %}
  student_id_mapping:
    file: ${STUDENT_ID_XWALK}
    header_rows: 1
    columns: 
      - student_id_from 
      - student_id_to
    optional: True 
  {% endif %}

transformations:

 academic_subject_expectations:
  source: $sources.academicSubjectDescriptors
  operations:
   - operation: rename_columns
     columns:
      namespace: namespace_left
      codeValue: codeValue_left
   - operation: join
      sources:
        - $sources.academicSubject_expectations
      join_type: left
      left_keys: 
        - namespace_left
        - codeValue_right
      right_key:
        - namespace
        - codeValue
  #####TODO: THIS WON'T WORK, BUT INCLUDING AS A HOLDER VALUE
  {% if $sources.academicSubject_expectations | length %}
  expect:
    - namespace != ''
    - codeValyue != ''
  {% endif %}

 grade_level_expectations:
  source: $sources.gradeLevelDescriptors
  operations:
   - operation: rename_columns
     columns:
      namespace: namespace_left
      codeValue: codeValue_left
   - operation: join
      sources:
        - $sources.gradeLevel_expectations
      join_type: left
      left_keys: 
        - namespace_left
        - codeValue_right
      right_key:
        - namespace
        - codeValue
  #####TODO: THIS WON'T WORK, BUT INCLUDING AS A HOLDER VALUE
  {% if $sources.academicSubject_expectations | length %}
  expect:
    - namespace != ''
    - codeValyue != ''
  {% endif %}

 academic_subject_descriptors:
  source: $sources.academicSubjectDescriptors
  operations:
    - operation: add_columns
          columns:
            subject_json: >
              {%raw-%}  
              {
                "academicSubjectDescriptor": "{{namespace}}#{{codeValue}}"
              },
              {%-endraw%}
        - operation: modify_columns
          columns:
            subject_json: "{%raw%}{{subject_json | replace('\n', '')-}}{%endraw%}"
        # group and aggregate:
        - operation: group_by
          group_by_columns:
            - assessmentIdentifier
          create_columns: 
            subject_json: agg(subject_json,)
        # there will be a trailing comma, want to get rid of that
        - operation: modify_columns
          columns:
            subject_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"

 grade_level_descriptors:
  source: $sources.gradeLevelDescriptors
  operations:
    - operation: add_columns
        columns:
          grade_json: >
            {%raw-%}  
            {
              "gradeLevelDescriptor": "{{namespace}}#{{codeValue}}"
            },
            {%-endraw%}
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{grade_json | replace('\n', '')-}}{%endraw%}"
      # group and aggregate:
      - operation: group_by
        group_by_columns:
          - assessment_id
        create_columns: 
          grade_json: agg(grade_json,)
      # there will be a trailing comma, want to get rid of that
      - operation: modify_columns
        columns:
          grade_json: "{%raw%}{{value.rstrip().rstrip(',')}}{%endraw%}"
    
  
 dibels_benchmark_student_assessment:
  source: $sources.dibels_benchmark_input
  operations:
    - operation: join
      sources:
        - $sources.student_id_mapping
      join_type: left
      left_key: ${STUDENT_ID_FROM}
      right_key: student_id_from
    - operation: join
      sources:
        - $sources.gradeLevelDescriptors_mapping
      join_type: inner
      left_key: Assessment Grade
      right_key: from
    - operation: rename_columns
      columns: 
        ${STUDENT_ID_NAME}: primary_id_student_id
    - operation: snake_case_columns
    - operation: add_columns
      columns:
        student_assessment_id: "{%raw%}{{primary_id_student_id}}_{{client_date}}_{{assessment_grade}}{%endraw%}"
        assessment_id: "Dibels-8"
    - operation: modify_columns
      columns:
        school_year: *year_mapping
        student_assessment_id: *id_hashing
  
 assessments:
  source: $transformations.dibels_benchmark_student_assessment
  operations:
    - operation: keep_columns
      columns: 
        - assessment_id
    - operation: distinct_rows
    - operation: join
      sources:
        - $transformations.grade_level_descriptors
      join_type: inner
      left_key: assessment_id
      right_key: assessmentIdentifier
    - operation: join
      sources:
        - $transformations.academic_subject_descriptors
      join_type: inner
      left_key: assessment_id
      right_key: assessmentIdentifier
    

destinations:
  objectiveAssessments:
    source: $sources.objectiveAssessments
    template: ${BUNDLE_DIR}/templates/objectiveAssessments.jsont
    extension: jsonl
    linearize: True
  performanceLevelDescriptors:
    source: $sources.performanceLevelDescriptors
    template: ${BUNDLE_DIR}/templates/performanceLevelDescriptors.jsont
    extension: jsonl
    linearize: True
  assessmentReportingMethodDescriptors:
    source: $sources.assessmentReportingMethodDescriptors
    template: ${BUNDLE_DIR}/templates/assessmentReportingMethodDescriptors.jsont
    extension: jsonl
    linearize: True
  assessments:
    source: $transformations.assessments
    template: ${BUNDLE_DIR}/templates/assessments.jsont
    extension: jsonl
    linearize: True
  studentAssessments:
    source: $transformations.dibels_benchmark_student_assessment
    template:  ${BUNDLE_DIR}/templates/studentAssessments.jsont
    extension: jsonl
    linearize: True
