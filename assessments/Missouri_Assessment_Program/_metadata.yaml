earthmover_config_file: earthmover.yaml
edfi_data_model_version_range: [">=0.3.0", "<0.4.0"]
assessment_year_validated_range: [">=2022", "<=2024"]
student_id_names: ["DISTRICT_STUDENT_NUMBER", "STUDENT_NUMBER", "MOSIS_STATE_ID"]
input_files:
  INPUT_FILE: 
    optional: false
    required_fields: ["CONTENT_AREA", "YEAR", "GRADE_LEVEL", "GRADE_OF_STUDENT"]
params:
  required: ["INPUT_FILE"]
  requires_user_input: []
  properties:
    INPUT_FILE:
      type: string
      format: data-url
      title: Assessment File
      description: The assessment file to be loaded