display_name: "Missouri Assessment Program (MAP)"
path: "assessments/Missouri_Assessment_Program"
earthmover_config_file: earthmover.yaml
student_id_names: ["DISTRICT_STUDENT_NUMBER", "STUDENT_NUMBER", "MOSIS_STATE_ID"]
input_files:
  - display_name: "Assessment data"
    env_var: "INPUT_FILE"
    is_required: true
    file_type: ["csv"]
input_params:
  - display_name: "School Year"
    env_var: "API_YEAR"
    is_required: true
