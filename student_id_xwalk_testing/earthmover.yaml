version: 2

config:
  output_dir: ${OUTPUT_DIR}
  log_level: INFO
  show_stacktrace: True
  show_graph: False
  parameter_defaults:
    POSSIBLE_STUDENT_ID_COLUMNS: "School_StateID,StudentID,Student_StateID"
    EDFI_STUDENT_ID_TYPES: "Local,District,State"

packages:
  assessment_bundle:
    git: https://github.com/edanalytics/earthmover_edfi_bundles.git
    subdirectory: assessments/NWEA_Map
    # might need configs to allow installing/using a different branch, etc.
  student_id_xwalk:
    git: https://github.com/edanalytics/earthmover_edfi_bundles.git
    branch: student_id_alignment_unified
    subdirectory: packages/student_ids

transformations:
  # currently this is hard-coded for NWEA_Map (so it will only work for that assessment)
  # but if we update all the bundles to use a main `sources.input` and
  # `transformations.input` (which could be a no-op transformation, with `operations: []`)
  # then we'd just override the `source` of `transformations.input` here
  # (no matter which bundle is selected)
  nwea_map_student_assessment:
    source: $transformations.input_xwalked
