config:
    log_level: DEBUG
    show_stacktrace: True
    output_dir: "/mnt/l/sc_edfi_analytics/assessment_roster/outputs/win/scde/20230714"



sources:

    win_source:
        file: "/mnt/l/sc_edfi_analytics/assessment_roster/raw/FINALv2_WIN_Learning_to_EDFI_All_Data 22-23_csv.csv"
        type: csv
        header_rows: 2
        encoding: latin1
        columns:
            - StudentUniqueId
            - SchoolId
            - InstitutionName

            - EntryGradeLevelDescriptor
            - LastSurname
            - FirstName
            - MiddleName
            - BirthDate
            - BirthSexDescriptor
            - LimitedEnglishProficiencyDescriptor
            - StudentDistrictId

            # assessmentCustomizations
            - IEP
            - Migrant
            - Accommodation
            - TestAdmin
            - Mode
            - LargePt
            - Braille
            - Oral
            - GR9
            - Retake
            - FedReport
            - _1
            - _2
            - _3
            - _4
            - _5
            - _6
            - _7



transformations:

    add_metadata:

        operations:
            - operation: add_columns
              source: $sources.win_source
              columns:
                  platform_type: "{%raw%}{% if Mode == 'O' %}Computer-based{% else %}Paper-based{% endif %}{%endraw%}"
                  district_id: "{%raw%}{{ SchoolId[:4] }}{%endraw%}"

    distinct_districts:

        operations:
            - operation: distinct_rows
              source: $transformations.add_metadata
              columns:
                - district_id



destinations:

    assessments:
        source: $transformations.distinct_districts
        template: ./templates/assessments.jsont
        extension: jsonl
        linearize: True

    assessmentAdministrationParticipations:
        source: $transformations.distinct_districts
        template: ./templates/assessmentAdministrationParticipations.jsont
        extension: jsonl
        linearize: True

    assessmentAdministrations:
        source: $transformations.distinct_districts
        template: ./templates/assessmentAdministrations.jsont
        extension: jsonl
        linearize: True

    studentAssessmentRegistrations:
        source: $transformations.add_metadata
        template: ./templates/studentAssessmentRegistrations.jsont
        extension: jsonl
        linearize: True
